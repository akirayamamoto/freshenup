name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff format --check src tests
      - run: uv run ruff check src tests
      - run: uv run pyright src tests
      - run: uv run pytest -q
